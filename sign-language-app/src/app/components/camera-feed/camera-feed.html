<div class="relative w-full max-w-4xl mx-auto rounded-3xl overflow-hidden shadow-[0_0_40px_rgba(79,172,254,0.15)] border border-gray-700/50 bg-gray-800/50 aspect-video group">
  
  <!-- Video Feed (Hidden initially or showing stream) -->
  <video #videoElement class="absolute inset-0 w-full h-full object-cover z-10 scale-x-[-1]" autoplay playsinline muted></video>
  
  <!-- Canvas for MediaPipe Drawing -->
  <canvas #canvasElement class="absolute inset-0 w-full h-full object-cover z-20 scale-x-[-1] pointer-events-none"></canvas>

  <!-- Placeholder / Loading State -->
  <div *ngIf="!isCameraActive()" class="absolute inset-0 flex flex-col items-center justify-center z-30 bg-gray-900/80 backdrop-blur-sm transition-opacity duration-300" id="camera-placeholder">
    <div class="w-20 h-20 mb-6 rounded-full bg-gray-800 flex items-center justify-center border border-gray-700">
      <svg *ngIf="!isLoading()" class="w-10 h-10 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
      <svg *ngIf="isLoading()" class="animate-spin w-10 h-10 text-brand-teal" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>
    <h3 class="text-xl font-display font-medium text-gray-200 mb-2">
      {{ isLoading() ? 'กำลังเปิดกล้องและโหลดโมเดล...' : 'กล้องยังไม่เปิดใช้งาน' }}
    </h3>
    <p class="text-gray-400 text-sm" *ngIf="!isLoading()">กดปุ่มด้านล่างเพื่ออนุญาตให้ระบบเข้าถึงกล้องของคุณ</p>
    
    <button *ngIf="!isLoading()" (click)="startCamera()" class="mt-6 px-6 py-2.5 bg-gradient-to-r from-brand-teal to-brand-purple text-white font-medium rounded-full shadow-[0_0_15px_rgba(0,242,254,0.4)] hover:shadow-[0_0_25px_rgba(0,242,254,0.6)] transition-all transform hover:scale-105 active:scale-95">
      เปิดกล้องเพื่อเริ่มแปล
    </button>
  </div>

  <!-- Decorative Corner Accents -->
  <div class="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-brand-teal rounded-tl-3xl z-40 opacity-50 m-4 pointer-events-none"></div>
  <div class="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-brand-purple rounded-tr-3xl z-40 opacity-50 m-4 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-16 h-16 border-b-4 border-l-4 border-brand-teal rounded-bl-3xl z-40 opacity-50 m-4 pointer-events-none"></div>
  <div class="absolute bottom-0 right-0 w-16 h-16 border-b-4 border-r-4 border-brand-purple rounded-br-3xl z-40 opacity-50 m-4 pointer-events-none"></div>
</div>
